services:

  # ── LocalStack (log-groups) ────────────────────────────────────────────────
  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=logs
      - DEFAULT_REGION=us-east-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  init-log-groups:
    image: amazon/aws-cli
    container_name: init-log-groups
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: >
      /bin/sh -c "
        aws --endpoint-url=http://localstack:4566 logs create-log-group --log-group-name producto-log-group || true &&
        aws --endpoint-url=http://localstack:4566 logs create-log-group --log-group-name ordenes-log-group  || true &&
        aws --endpoint-url=http://localstack:4566 logs create-log-group --log-group-name pagos-log-group    || true &&
        echo 'Log groups created.'
      "

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Eureka Server ─────────────────────────────────────────────────────────
  eureka-server:
    build:
      context: ../ExamenMicroservicios_eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── API Gateway ───────────────────────────────────────────────────────────
  apigateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apigateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
    depends_on:
      eureka-server:
        condition: service_healthy

  # ── productos-service ─────────────────────────────────────────────────────
  productos-service:
    build:
      context: ../ExamenMicroservicios_productos-service
      dockerfile: Dockerfile
    container_name: productos-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/productosdb
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    depends_on:
      eureka-server:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      localstack:
        condition: service_healthy

  # ── ordenes-service ───────────────────────────────────────────────────────
  ordenes-service:
    build:
      context: ../ExamenMicroservicios_ordenes-service
      dockerfile: Dockerfile
    container_name: ordenes-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/ordenesdb
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    depends_on:
      eureka-server:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      localstack:
        condition: service_healthy

  # ── pagos-service ─────────────────────────────────────────────────────────
  pagos-service:
    build:
      context: ../ExamenMicroservicios_pagos-service
      dockerfile: Dockerfile
    container_name: pagos-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/pagosdb
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    depends_on:
      eureka-server:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      localstack:
        condition: service_healthy

volumes:
  mongodb-data:
